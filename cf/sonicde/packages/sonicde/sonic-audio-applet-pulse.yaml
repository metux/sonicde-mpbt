sources:
    git:
        ref:    origin/${master_branch}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}.git
                depth:  ${sonic_depth}
                fetch:  ${@SOLUTION::fetch::origin}
            upstream:
                url:    ${plasma_git}/plasma-pa.git
                depth:  ${upstream_depth}
                fetch:  ${@SOLUTION::fetch::upstream}
        config:
            autopick.enabled:       "true"
            autopick.upstream:      upstream/Plasma/6.6
            autopick.master:        origin/${master_branch}
            autopick.tracker:       origin/tracking/plasma-6.6
            advice.detachedHead:    "false"
            remote.origin.tagOpt:   --no-tags
            remote.upstream.tagOpt: --no-tags
        local-branch: ${master_branch}

master_branch: Plasma/6.6

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - kde/libraries/pulseaudio-qt
    - kde/kf6/kdeclarative
    - kde/kf6/kstatusnotifieritem
    - kde/kf6/ksvg
    - sonicde/sonic-interface-libraries

cmake-extra-args:
    - -DBUILD_DOC=OFF
