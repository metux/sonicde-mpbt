sources:
    git:
        url:    ${@SOLUTION::sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/heads/*:refs/remotes/origin/*
          - refs/tags/*:refs/tags/*

ref: origin/Plasma/6.6

buildsystem: cmake

build-depends:
    - buildtool/extra-cmake-modules

depends:
    - kde/libraries/pulseaudio-qt

cmake-extra-args:
    - -DBUILD_DOC=OFF
