sources:
    git:
        url:    ${sonicde_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/heads/*:refs/remotes/origin/*

ref: origin/Plasma/6.6

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - kde/libraries/pulseaudio-qt
    - kde/kf6/kdeclarative
    - kde/kf6/kstatusnotifieritem
    - kde/kf6/ksvg
    - sonicde/sonic-interface-libraries

cmake-extra-args:
    - -DBUILD_DOC=OFF
