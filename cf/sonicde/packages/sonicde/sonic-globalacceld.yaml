# we already have a sonic repo, but that still very old

sources:
    git:
        url:    ${@SOLUTION::sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/tags/*:refs/tags/*
          - refs/heads/*:refs/remotes/origin/*

# ref: ${@SOLUTION::plasma_version}
ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kconfig
    - kde/kf6/kcoreaddons
    - kde/kf6/kcrash
    - kde/kf6/kdbusaddons
    - kde/kf6/kservice
    - kde/kf6/kio
    - sonicde/sonic-frameworks-windowsystem
    - sonicde/sonic-frameworks-globalaccel
