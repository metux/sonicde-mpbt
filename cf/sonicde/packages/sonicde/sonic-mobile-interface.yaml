sources:
    git:
        url:    ${@SOLUTION::sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/heads/*:refs/remotes/origin/*
          - refs/tags/*:refs/tags/*

ref: origin/Plasma/6.5

buildsystem: cmake

build-depends:
    - buildtool/extra-cmake-modules

depends:
    - kde/kf6/networkmanager-qt
    - kde/kf6/modemmanager-qt
    - kde/plasma/kpipewire
    - kde/libraries/kirigami-addons
    - sonicde/sonic-win

