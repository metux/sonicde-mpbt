sources:
    git:
        ref:    ${ref}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}
                depth:  1
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
            upstream:
                url:    ${plasma_git}/plasma-mobile
                depth:  1
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - kde/kf6/networkmanager-qt
    - kde/kf6/modemmanager-qt
    - kde/plasma/kpipewire
    - kde/libraries/kirigami-addons
    - sonicde/sonic-win
