sources:
    git:
        url:    ${sonicde_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/heads/*:refs/remotes/origin/*

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - kde/kf6/networkmanager-qt
    - kde/kf6/modemmanager-qt
    - kde/plasma/kpipewire
    - kde/libraries/kirigami-addons
    - sonicde/sonic-win
