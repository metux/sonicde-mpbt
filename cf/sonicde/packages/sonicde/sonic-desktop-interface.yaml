sources:
    git:
        url:    ${@SOLUTION::sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/heads/*:refs/remotes/origin/*
          - refs/tags/*:refs/tags/*

ref: origin/mtx/hack/Plasma/6.6

buildsystem: cmake

depends:
    - qt6/qtdeclarative
    - qt6/qt5compat
    - qt6/qtsvg
    - kde/ksvg
    - kde/kauth
    - kde/kcrash
    - kde/knewstuff
    - kde/knotifications
    - kde/kcodecs
    - kde/kdbusaddons
    - kde/sonnet
    - kde/kglobalaccel
    - kde/kiconthemes
    - sonicde/sonic-frameworks-runner
    - sonicde/sonic-frameworks-io
    - kde/kxmlgui
    - kde/kcmutils
    - kde/knotifyconfig
    - kde/plasma/plasma5support
    - kde/plasma-framework
    - kde/plasma-activities-stats
    - sonicde/sonic-workspace
#    - kde/plasma/kscreenlocker
    - sonicde/sonic-win

build-depends:
    - buildtool/extra-cmake-modules

cmake-extra-args:
    - -DBUILD_KCM_TABLET=OFF
    - -DBUILD_DOC=OFF
