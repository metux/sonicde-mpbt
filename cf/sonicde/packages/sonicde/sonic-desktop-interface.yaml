sources:
    git:
        url:    ${sonicde_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/heads/*:refs/remotes/origin/*

ref: origin/master

buildsystem: cmake

depends:
    - qt6/qtdeclarative
    - qt6/qt5compat
    - qt6/qtsvg
    - kde/kf6/ksvg
    - sonicde/sonic-frameworks-auth
    - kde/kf6/kcrash
    - kde/kf6/knewstuff
    - kde/kf6/knotifications
    - kde/kf6/kcodecs
    - kde/kf6/kdbusaddons
    - kde/kf6/sonnet
    - kde/kf6/kiconthemes
    - sonicde/sonic-frameworks-globalaccel
    - sonicde/sonic-frameworks-runner
    - sonicde/sonic-frameworks-io
    - kde/kf6/kxmlgui
    - kde/kf6/kcmutils
    - kde/kf6/knotifyconfig
    - kde/plasma/plasma5support
    - kde/plasma/plasma-activities-stats
    - sonicde/sonic-workspace
    - sonicde/sonic-win
    - sonicde/sonic-interface-libraries
    - sonicde/sonic-screenlocker

build-depends:
    - kde/kf6/extra-cmake-modules

cmake-extra-args:
    - -DBUILD_KCM_TABLET=OFF
    - -DBUILD_DOC=OFF
