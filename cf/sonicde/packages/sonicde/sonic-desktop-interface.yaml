sources:
    git:
        url:    ${@SOLUTION::sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/heads/*:refs/remotes/origin/*
          - refs/tags/*:refs/tags/*

ref: origin/mtx/hack/Plasma/6.6

buildsystem: cmake

depends:
    - qt6/qtdeclarative
    - qt6/qt5compat
    - qt6/qtsvg
    - kde/kf6/ksvg
    - kde/kf6/kauth
    - kde/kf6/kcrash
    - kde/kf6/knewstuff
    - kde/kf6/knotifications
    - kde/kf6/kcodecs
    - kde/kf6/kdbusaddons
    - kde/kf6/sonnet
    - kde/kf6/kglobalaccel
    - kde/kf6/kiconthemes
    - sonicde/sonic-frameworks-runner
    - sonicde/sonic-frameworks-io
    - kde/kf6/kxmlgui
    - kde/kf6/kcmutils
    - kde/kf6/knotifyconfig
    - kde/plasma/plasma5support
    - kde/plasma/plasma-activities-stats
    - sonicde/sonic-workspace
    - sonicde/sonic-win
    - sonicde/sonic-interface-libraries

build-depends:
    - buildtool/extra-cmake-modules

cmake-extra-args:
    - -DBUILD_KCM_TABLET=OFF
    - -DBUILD_DOC=OFF
