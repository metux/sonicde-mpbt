sources:
    git:
        ref:    origin/${master_branch}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}.git
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
                  - refs/tags/*:refs/tags/origin/*
            upstream:
                url:    ${plasma_git}/plasma-desktop.git
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*
        config:
            autopick.enabled:       "true"
            autopick.upstream:      upstream/Plasma/6.6
            autopick.master:        ${ref}
            autopick.tracker:       origin/tracking/plasma-6.6
            advice.detachedHead:    "false"
            remote.origin.tagOpt:   --no-tags
            remote.upstream.tagOpt: --no-tags
        local-branch: ${master_branch}

master_branch: master

buildsystem: cmake

depends:
    - qt6/qtdeclarative
    - qt6/qt5compat
    - qt6/qtsvg
    - kde/kf6/ksvg
    - sonicde/sonic-frameworks-auth
    - kde/kf6/kcrash
    - kde/kf6/knewstuff
    - kde/kf6/knotifications
    - kde/kf6/kcodecs
    - kde/kf6/kdbusaddons
    - kde/kf6/sonnet
    - kde/kf6/kiconthemes
    - sonicde/sonic-frameworks-keybind
    - sonicde/sonic-frameworks-runner
    - sonicde/sonic-frameworks-io
    - kde/kf6/kxmlgui
    - kde/kf6/kcmutils
    - kde/kf6/knotifyconfig
    - kde/plasma/plasma5support
    - kde/plasma/plasma-activities-stats
    - sonicde/sonic-workspace
    - sonicde/sonic-win
    - sonicde/sonic-interface-libraries
    - sonicde/sonic-screenlocker

build-depends:
    - kde/kf6/extra-cmake-modules

cmake-extra-args:
    - -DBUILD_KCM_TABLET=OFF
    - -DBUILD_DOC=OFF
