sources:
    git:
        ref:    ${ref}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
            upstream:
                url:    ${plasma_git}/plasma-workspace
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*
        config:
            autopick.enabled:     "true"
            autopick.upstream:    upstream/Plasma/6.6
            autopick.master:      ${ref}
            autopick.tracker:     origin/tracking/plasma-6.6
            advice.detachedHead:  "false"

ref: origin/master

buildsystem: cmake

depends:
    - qt6/qtlocation
    - kde/libraries/polkit-qt-1
    - kde/kf6/kdeclarative
    - kde/kf6/prison
    - kde/qcoro6
    - sonicde/sonic-win
    - sonicde/sonic-screen
    - sonicde/sonic-interface-libraries
    - sonicde/sonic-screenlocker
    - kde/kf6/kded
    - kde/kf6/kparts
    - kde/kf6/ktexteditor
    - kde/kf6/ktextwidgets
    - kde/kf6/kwallet

build-depends:
    - kde/kf6/extra-cmake-modules
