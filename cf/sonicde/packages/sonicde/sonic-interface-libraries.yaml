sources:
    git:
        url:    ${@SOLUTION::sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/tags/*:refs/tags/*
          - refs/heads/*:refs/remotes/origin/*

    git-ext:
        upstream:
            url: https://invent.kde.org/plasma/plasma-framework

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kconfig
    - kde/kf6/breeze-icons
    - kde/kwindowsystem
    - kde/kf6/kitemmodels
