sources:
    git:
        ref:    ${ref}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
            upstream:
                url:    ${plasma_git}/libplasma
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - sonicde/sonic-frameworks-windowsystem
    - kde/kf6/kconfig
    - kde/kf6/breeze-icons
    - kde/kf6/kitemmodels
    - kde/plasma/plasma-activities
