provides: kde/kwin-dbus-interface
sources:
    git:
        ref:    ${ref}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}.git
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
                  - refs/tags/*:refs/tags/origin/*
            upstream:
                url:    ${plasma_git}/kwin-x11.git
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*
        config:
            autopick.enabled:       "true"
            autopick.upstream:      upstream/Plasma/6.6
            autopick.master:        ${ref}
            autopick.tracker:       origin/tracking/plasma-6.6
            advice.detachedHead:    "false"
            remote.origin.tagOpt:   --no-tags
            remote.upstream.tagOpt: --no-tags

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - sys/libdrm
    - qt6/qtbase
    - qt6/qtsensors
    - kde/plasma/kdecoration
    - kde/plasma/knighttime
    - kde/kf6/kidletime
    - kde/kf6/ksvg
    - kde/kf6/kcmutils
    - sonicde/sonic-keybind-daemon

cmake-extra-args:
    - -DBUILD_TESTING=OFF
    - -DKWIN_BUILD_SCREENLOCKER=OFF
