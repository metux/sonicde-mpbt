sources:
    git:
        url:    ${sonicde_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/heads/*:refs/remotes/origin/*

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - sonicde/sonic-frameworks-windowsystem
    - kde/kf6/kconfig
    - kde/kf6/breeze-icons
    - kde/kf6/kitemmodels
