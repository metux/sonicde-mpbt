sources:
    git:
        ref:    origin/${master_branch}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}.git
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
                  - refs/tags/*:refs/tags/origin/*
            upstream:
                url:    https://github.com/Ziednaga/AndromiX-SDDM-Theme.git
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*
        config:
            remote.origin.tagOpt:   --no-tags
        local-branch: ${master_branch}

master_branch: master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules
