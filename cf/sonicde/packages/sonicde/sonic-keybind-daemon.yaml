# we already have a sonic repo, but that still very old

sources:
    git:
        ref:    ${ref}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
                  - refs/tags/*:refs/tags/origin/*
            upstream:
                url:    ${plasma_git}/kglobalacceld
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*
        config:
            autopick.enabled:     "true"
            autopick.upstream:    upstream/Plasma/6.6
            autopick.master:      ${ref}
            autopick.tracker:     origin/tracking/plasma-6.6
            advice.detachedHead:  "false"
            remote.origin.tagOpt:   --no-tags
            remote.upstream.tagOpt: --no-tags

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kconfig
    - kde/kf6/kcoreaddons
    - kde/kf6/kcrash
    - kde/kf6/kdbusaddons
    - kde/kf6/kservice
    - kde/kf6/kio
    - sonicde/sonic-frameworks-windowsystem
    - sonicde/sonic-frameworks-keybind
