sources:
    git:
        ref:    ${ref}
        remotes:
            origin:
                url:    ${sonicde_git}/${@basename}
                depth:  ${sonic_depth}
                fetch:
                  - refs/heads/*:refs/remotes/origin/*
            upstream:
                url:    https://github.com/paulmcauley/klassy
                depth:  ${upstream_depth}
                fetch:
                  - refs/heads/*:refs/remotes/upstream/*
                  - refs/tags/*:refs/tags/upstream/*

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kcoreaddons
    - kde/kf6/kcmutils
    - kde/kf6/kiconthemes
    - kde/kf6/kcolorscheme
    - kde/kf6/kguiaddons
    - kde/plasma/kdecoration
