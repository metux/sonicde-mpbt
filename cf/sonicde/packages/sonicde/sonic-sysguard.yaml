provides: kde/kwin-dbus-interface
sources:
    git:
        url:    ${sonicde_git}/${@basename}
        ref:    ${ref}
        fetch:
          - refs/heads/*:refs/remotes/origin/*

ref: origin/master

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/knewstuff
    - sys/libnl-3.0
    - sys/libnl-route-3.0
    - sys/libsensors
