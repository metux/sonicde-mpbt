sources:
    git:
        url:    ${kf6_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${kf6_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kconfigwidgets
    - kde/kf6/kitemviews
    - sonicde/sonic-frameworks-keybind
