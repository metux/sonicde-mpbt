sources:
    git:
        url:    ${@SOLUTION::kf6_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${@SOLUTION::kf6_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kservice
    - kde/kf6/solid
    - kde/kf6/kbookmarks
    - kde/kf6/kcompletion
    - kde/kf6/kitemviews
    - kde/kf6/kjobwidgets
    - kde/kf6/kcolorscheme
    - kde/kf6/kiconthemes

cmake-extra-args:
    - -DWITH_WAYLAND=OFF
