sources:
    git:
#        url:    ${@SOLUTION::kf6_git}/${@basename}
        url:    git@github.com:oss-qm/kguiaddons.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/heads/*:refs/remotes/origin/*
          - refs/tags/*:refs/tags/*

#ref: v6.23.0
ref: origin/maint/6.23.0

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/pyside/pyside-setup

cmake-extra-args:
    - -DWITH_WAYLAND=OFF
    - -DWITH_X11=ON
