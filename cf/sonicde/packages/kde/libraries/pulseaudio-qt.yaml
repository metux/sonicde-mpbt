sources:
    git:
        url:    https://invent.kde.org/libraries/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - +refs/tags/*:refs/tags/*
          - +refs/heads/*:refs/remotes/origin/*

ref: origin/master

buildsystem: cmake

depends:
    - qt6/qtbase

cmake-extra-args:
    - -DFEATURE_developer_build=ON

