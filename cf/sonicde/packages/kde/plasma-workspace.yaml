sources:
    git:
        url:    https://invent.kde.org/plasma/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${@SOLUTION::plasma_version}

buildsystem: cmake

build-depends:
    - build/cmake
    - kde/extra-cmake-modules

depends:
    - qt6/qtbase
    - qt6/qtlocation
    - qt6/qtspeech
    - kde/kdeclarative
    - kde/qcoro6
    - kde/kded
    - kde/kparts
    - kde/ktexteditor
    - kde/prison
    - kde/kwallet
    - kde/ktextwidgets
    - kde/kstatusnotifieritem
    - kde/libkscreen
    - kde/plasma/libksysguard
    - kde/plasma/layer-shell-qt
    - kde/kwin-dbus-interface
