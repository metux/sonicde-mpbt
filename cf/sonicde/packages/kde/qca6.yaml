sources:
    git:
        url:    https://github.com/KDE/qca
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: v2.3.10

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase

cmake-extra-args:
    - -DBUILD_WITH_QT6=ON
