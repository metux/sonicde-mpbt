sources:
    git:
        url:    ${plasma_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}
        force-checkout: ${plasma_force}

ref: ${plasma_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules
    - kde/plasma/plasma-activities

depends:
    - qt6/qtbase
