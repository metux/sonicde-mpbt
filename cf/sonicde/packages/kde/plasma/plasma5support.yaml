sources:
    git:
        url:    ${plasma_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}
        force-checkout: ${plasma_force}

ref: ${plasma_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kidletime
    - kde/kf6/kunitconversion
    - kde/kf6/kholidays
