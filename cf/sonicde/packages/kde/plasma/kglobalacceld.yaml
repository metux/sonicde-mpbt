# we already have a sonic repo, but that still very old

sources:
    git:
        url:    ${@SOLUTION::plasma_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${@SOLUTION::plasma_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - kde/kf6/kconfig
    - kde/kf6/kcoreaddons
    - kde/kf6/kcrash
    - kde/kf6/kdbusaddons
    - kde/kf6/kglobalaccel
    - kde/kf6/kservice
    - kde/kf6/kio
    - sonicde/sonic-frameworks-windowsystem
