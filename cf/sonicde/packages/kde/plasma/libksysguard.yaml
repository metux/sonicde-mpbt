sources:
    git:
        url:    ${@SOLUTION::plasma_git}/${@basename}
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${@SOLUTION::plasma_version}

buildsystem: cmake

build-depends:
    - build/cmake
    - kde/extra-cmake-modules

depends:
    - qt6/qtbase

# depends on libnl-3-dev and libnl-route-3-dev
# depends on libsensors-dev
