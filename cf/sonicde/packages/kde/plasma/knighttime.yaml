sources:
    git:
        url:    ${@SOLUTION::plasma_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${@SOLUTION::plasma_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase
    - qt6/qtlocation
    - qt6/qtspeech
    - sonicde/sonic-screen
    - kde/qcoro6
    - kde/kf6/kdeclarative
    - kde/kf6/kded
    - kde/kf6/kparts
    - kde/kf6/ktexteditor
#    - kde/kf6/prison
    - kde/kf6/kwallet
    - kde/kf6/ktextwidgets
    - kde/kf6/kstatusnotifieritem
    - kde/plasma/libksysguard
