sources:
    git:
        url:    ${plasma_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}
        force-checkout: ${plasma_force}

ref: ${plasma_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - os-installed/libva
    - qt6/qtbase
    - sys/libavcodec
    - sys/libavfilter
    - sys/libavformat
    - sys/libpipewire-0.3

cmake-extra-args:
    - -DBUILD_TESTING=OFF # needs wayland
