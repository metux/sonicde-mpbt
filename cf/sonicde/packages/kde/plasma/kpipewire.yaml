sources:
    git:
        url:    ${@SOLUTION::plasma_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

ref: ${@SOLUTION::plasma_version}

buildsystem: cmake

build-depends:
    - kde/kf6/extra-cmake-modules

depends:
    - qt6/qtbase

# libpipewire-0.3-dev
# libavcodec-dev
# libavformat-dev
# libavfilter

cmake-extra-args:
    - -DBUILD_TESTING=OFF # needs wayland
