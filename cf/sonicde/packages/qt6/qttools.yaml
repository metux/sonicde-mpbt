sources:
    git:
        url:    ${qt6_git}/${@basename}.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}
        post-checkout-cmd:
          - ${@PROJECT::@rootdir}/cf/sonicde/scripts/post-clone-submodules.sh

ref: ${qt6_version}

buildsystem: cmake

depends:
    - qt6/qtbase

cmake-extra-args:
    - -DFEATURE_developer_build=ON
