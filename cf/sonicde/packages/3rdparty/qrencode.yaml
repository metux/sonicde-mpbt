        url:    https://github.com/fukuchi/libqrencode.git
        ref:    ${ref}
        depth:  1
        fetch:
          - refs/tags/${ref}:refs/tags/${ref}

buildsystem: cmake

ref: v4.1.1

cmake-extra-args:
    - -DWITH_TOOLS=OFF
    - -DWITH_TESTS=OFF
    - -DBUILD_SHARED_LIBS=ON
